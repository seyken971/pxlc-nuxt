name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# contents: read au niveau global (checkout dans build).
# pages: write + id-token: write limités au job deploy uniquement.
permissions:
  contents: read

# Une seule exécution par branche à la fois — un nouveau push annule un build
# en cours sur la même branche. Le groupe est scopé par ref pour que les PRs
# Dependabot ne s'annulent pas mutuellement et ne cancellent pas le run main.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt into Node.js 24 action runtimes before GitHub forces the migration
  # on 2026-06-02. The build itself still targets Node.js 22 (setup-node
  # below) — this only affects the action runner internals (checkout, etc.).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # Cache Nuxt's build cache (fonts, @nuxt/image transforms, nitro
      # chunks). The nuxt-og-image / og-image dirs are explicitly EXCLUDED
      # because the OG PNG filename is hashed on the input props
      # (eyebrow/title/description), not on the rendered output — so a
      # template change with the same props re-uses the stale PNG from
      # the cache and ships dark/old visuals despite a fresh build.
      # Regenerating the 9 OGs is ~5s on Ubuntu; not worth the cache risk.
      #
      # The `v2-` prefix in the key is a manual bust — restore-keys would
      # otherwise pull older saves that still contain the OG dirs.
      - name: Cache Nuxt build artefacts
        uses: actions/cache@v5
        with:
          path: |
            node_modules/.cache
            .nuxt/cache
            !.nuxt/cache/nuxt-og-image
            !.nuxt/cache/og-image
          key: nuxt-v2-${{ runner.os }}-${{ hashFiles('package-lock.json', 'nuxt.config.ts', 'content.config.ts') }}
          restore-keys: |
            nuxt-v2-${{ runner.os }}-

      - name: Install dependencies
        # `npm install` (not `npm ci`) — a transitive commander@^11 / @^13
        # mismatch between @nuxt/content (lunr) and @bomb.sh/tab still
        # trips npm ci's strict resolver even after the unused module
        # deps were dropped. `npm install` resolves it on the fly.
        run: npm install --no-audit --no-fund

      - name: Nuxt prepare
        # Generates .nuxt/eslint.config.mjs (and other .nuxt/* artefacts)
        # needed by the ESLint step below. Normally run by the postinstall
        # lifecycle but made explicit here for reliability.
        run: npx nuxt prepare

      - name: Lint (ESLint)
        # @nuxt/eslint flat config: catches Vue 3 / TS / Nuxt rule
        # violations before they ship. Fast (~3 s) — runs before the
        # heavier build / a11y / lighthouse steps so a syntax issue
        # fails fast.
        run: npm run lint

      - name: Typecheck (vue-tsc)
        # `nuxt typecheck` wraps vue-tsc with the right project refs.
        # Fails the build on TS errors so type regressions can't slip
        # past review.
        run: npm run typecheck

      - name: Design-system lint (ds-lint)
        # Gate marque « non négociable » : couleurs/rgba/ease bruts, gradients,
        # vocabulaire interdit, emoji, longueurs SEO, nommage des composants,
        # insécables. Normalement chaîné par prebuild/pregenerate, mais la CI
        # build via `npx nuxt build` (ci-dessous), ce qui NE déclenche PAS les
        # hooks npm pre*/post* — d'où ces étapes explicites.
        run: npm run ds-lint

      - name: Validate content frontmatter
        # Gate contenu : champs requis + longueurs SEO effectives des articles
        # @nuxt/content. Même raison que ds-lint — explicite car les hooks npm
        # ne tournent pas sur un appel direct au binaire nuxt.
        run: npm run validate-content

      - name: Generate static site (SSG)
        # --preset github_pages = preset officiel Nitro pour GitHub Pages
        # (génère .nojekyll, gère le 404 fallback, prerender toutes les routes
        # via crawlLinks: true défini dans nuxt.config.ts).
        run: npx nuxt build --preset github_pages

      - name: Prune unused public assets
        # postbuild/postgenerate ne se déclenche pas sur `npx nuxt build` — on
        # élague explicitement les polices _og-static-fonts/ (~460 KB) inutiles
        # en prod (ogImage.zeroRuntime) AVANT l'upload de l'artefact Pages.
        run: node scripts/prune-public.mjs

      - name: Verify build output
        # Cheap guardrail — if prerender produced an empty .output/public/
        # or the home page is missing, fail loud instead of uploading a
        # broken artefact to Pages.
        run: |
          test -f .output/public/index.html || { echo "::error::Missing .output/public/index.html"; exit 1; }
          test -f .output/public/sitemap.xml || { echo "::error::Missing sitemap.xml"; exit 1; }

      - name: A11y audit — static (axe-core + jsdom)
        # Fast check on the prerendered HTML. Catches semantic regressions
        # (labels, landmarks, ARIA) but can't see contrast or layout.
        run: npm run a11y

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        # --with-deps adds the OS-level libs Chromium needs on Ubuntu;
        # the binary itself comes from cache on hit. ~150 MB cold, ~5 s warm.
        run: npx playwright install chromium --with-deps

      - name: A11y audit — runtime (axe-core + headless Chromium)
        # Complements the static check with the rules that need a real
        # browser: color-contrast, target-size, focus visibility, plus
        # dynamic states (mobile menu open, FAQ open).
        run: npm run a11y:runtime

      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: .output/public

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
