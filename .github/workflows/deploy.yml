name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Permissions minimales pour GitHub Pages via Actions
permissions:
  contents: read
  pages: write
  id-token: write

# Une seule exécution à la fois — un nouveau push annule un build en cours
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # `npm install` (not `npm ci`) — Nuxt 4 + @nuxt/content + @nuxtjs/seo
        # have a transitive dep conflict (@bomb.sh/tab → commander@^13 while
        # the tree resolves commander@^11) that npm ci refuses to install in
        # strict mode. `npm install` resolves it on the fly. Trade-off:
        # marginally slower + lockfile may drift; both acceptable here.
        run: npm install --no-audit --no-fund

      - name: Generate static site (SSG)
        # nuxt generate = prerender de toutes les routes + OG images
        # (ogImage.zeroRuntime: true dans nuxt.config.ts).
        run: npx nuxt generate
        env:
          NITRO_PRESET: github-pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
