name: Lighthouse (weekly)

# Runs every Sunday at 18:00 UTC (~19:00 Paris winter / 20:00 summer) and
# on-demand via the Actions tab. Separate from the deploy workflow on
# purpose — Lighthouse is slow (~5 min for the 7 routes) and noisy on
# localhost, so we don't want it gating PRs. The cron gives us a weekly
# trendline of any perf regression that crept in.
#
# The job produces a markdown table in the workflow run summary (no
# artefacts, no PR comments) — open the run from the Actions tab to read
# it. Non-blocking: even if scores tank, the job is informational.

on:
  schedule:
    - cron: '0 18 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighthouse
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate static site
        run: npx nuxt generate
        env:
          NITRO_PRESET: github-pages

      - name: Run Lighthouse
        # ubuntu-latest ships Google Chrome stable at /usr/bin/google-chrome,
        # which is what chrome-launcher picks up. No extra install needed.
        # The script writes a Markdown digest to $GITHUB_STEP_SUMMARY.
        # `continue-on-error` so a sub-0.9 score doesn't fail the run —
        # this workflow is informational only.
        run: npm run lighthouse
        continue-on-error: true
